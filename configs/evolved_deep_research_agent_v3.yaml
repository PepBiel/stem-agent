genome:
  id: evolved_deep_research_v1
  version: 3
  parent: configs/evolved_deep_research_agent_v2.yaml
  schema: configs/genome_schema.yaml
  evolution_stage: coverage_budget_tuned_candidate
  hypothesis: >
    A structured deep-research workflow should improve coverage, evidence
    quality, and citation support over the web-search baseline by making source
    triage, evidence extraction, coverage checking, contradiction checking, and
    citation auditing explicit.
  tuning_notes: >
    Version 3 keeps fixed evaluation aspect injection but lowers reasoning
    effort and search/source budgets after the DR-001 v2 smoke improved
    coverage while increasing token cost beyond the target budget.
  derived_from_failure_modes:
    - missing_required_aspects
    - weak_source_triage
    - citation_mismatch_risk
    - contradiction_missed
    - shallow_decision_criteria

agent:
  id: evolved_deep_research_agent
  type: evolved_deep_research_v3
  domain: technical_deep_research_llm_agents
  description: >
    Budget-tuned candidate. It keeps v2's fixed coverage injection, but lowers
    reasoning effort and search/source budgets so the evolved workflow can be
    evaluated across more questions without exceeding the target cost envelope.

model:
  provider: openai
  env_var: OPENAI_MODEL
  recommended_default: gpt-5.4-mini
  reasoning_effort: low

workflow:
  - receive_question
  - decompose_question
  - create_search_plan
  - collect_candidate_sources
  - source_triage
  - extract_evidence
  - coverage_check
  - contradiction_check
  - synthesize_answer
  - citation_audit
  - report_limitations

prompt_roles:
  planner:
    objective: >
      Convert the user question into required subquestions and decision
      criteria before searching.
    must_output:
      - subquestions
      - required_aspects
      - expected_source_types
  searcher:
    objective: >
      Generate focused search queries that target primary sources, papers,
      official docs, benchmarks, and implementation repositories.
    must_output:
      - queries
      - rationale_per_query
  source_triager:
    objective: >
      Rank candidate sources by authority, recency, relevance, and whether they
      can support concrete claims.
    must_output:
      - accepted_sources
      - rejected_sources
      - rejection_reasons
  evidence_extractor:
    objective: >
      Convert accepted sources into a compact evidence table instead of
      summarizing from memory.
    must_output:
      - claim
      - source_url
      - source_type
      - supported_aspect
      - confidence
  coverage_auditor:
    objective: >
      Check whether each required aspect is supported by at least one evidence
      item before synthesis.
    must_output:
      - covered_aspects
      - missing_aspects
      - followup_needed
  contradiction_auditor:
    objective: >
      Identify source disagreement, uncertainty, or claims that should be
      softened rather than stated as facts.
    must_output:
      - conflicting_claims
      - resolution
      - uncertainty_notes
  citation_auditor:
    objective: >
      Verify that important answer claims have source support and that sources
      are not only decorative.
    must_output:
      - supported_claims
      - unsupported_claims
      - weak_citations
  synthesizer:
    objective: >
      Produce a concise engineering answer grounded in the evidence table and
      explicitly mention trade-offs, limits, and unresolved uncertainty.
    must_output:
      - answer
      - sources
      - limitations

tools:
  allowed:
    - web_search
  forbidden:
    - arbitrary_code_execution
    - source_modification
    - unbounded_web_browsing
    - filesystem_write

limits:
  max_search_queries: 2
  max_sources: 4
  max_model_calls: 4
  max_runtime_seconds: 180
  max_evolution_rounds: 2

memory:
  policy: run_scoped_evidence_table
  rationale: >
    The agent may keep structured evidence during one run, but it must not use
    long-term memory across evaluation questions. This keeps the fixed
    evaluation set comparable across baselines and evolved candidates.
  allowed_items:
    - decomposition
    - search_plan
    - source_triage_table
    - evidence_table
    - coverage_audit
    - contradiction_audit
    - citation_audit

safeguards:
  require_primary_or_authoritative_sources: true
  require_rejected_source_reasons: true
  require_claim_level_citations: true
  require_limitations_section: true
  forbid_uncited_key_claims: true
  forbid_hidden_extra_tool_calls: true
  on_budget_exceeded: stop_and_report_limitations

trace:
  required_events:
    - question_received
    - decomposition_created
    - search_plan_created
    - candidate_sources_collected
    - sources_triaged
    - evidence_extracted
    - coverage_checked
    - contradictions_checked
    - answer_synthesized
    - citations_audited
    - final_answer_returned
  required_artifacts:
    - decomposition
    - search_plan
    - candidate_sources
    - source_triage
    - evidence_table
    - coverage_audit
    - contradiction_audit
    - citation_audit
    - final_answer
    - usage

output_contract:
  required_sections:
    - answer
    - sources
    - limitations
  citation_style: inline_url
  unsupported_claim_policy: reject_or_flag
  required_answer_properties:
    - concise_engineering_summary
    - explicit_tradeoffs
    - uncertainty_when_evidence_is_mixed
    - no_source_free_key_claims

evaluation:
  question_set: evals/questions.json
  rubric: evals/rubric.yaml
  compare_against:
    - baseline_no_web
    - baseline_web
  metrics:
    - final_score
    - judge_score
    - coverage_score
    - citation_support_score
    - source_quality_score
    - unsupported_claim_count
    - contradiction_handling_score
    - combined_total_tokens

acceptance_criteria:
  primary_metric: final_score
  metrics:
    - final_score
    - judge_score
    - coverage_score
    - source_quality_score
    - unsupported_claim_count
    - combined_total_tokens
  accept_if:
    final_score_delta_vs_baseline_web: 0.03
    judge_score_delta_vs_baseline_web: 0.02
    source_quality_score_delta_min: 0.0
    unsupported_claim_count_delta_max: 0
    combined_total_tokens_multiplier_vs_baseline_web_max: 1.8
  reject_if:
    - final_score_below_baseline_web
    - judge_score_below_baseline_web
    - citation_audit_missing
    - coverage_audit_missing
    - tool_budget_exceeded_without_reporting

rollback:
  policy: keep_previous_best_genome
  previous_best: configs/evolved_deep_research_agent_v2.yaml
  trigger:
    - validation_failed
    - smoke_test_failed
    - evaluation_regression
