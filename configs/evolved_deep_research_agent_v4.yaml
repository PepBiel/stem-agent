genome:
  id: evolved_deep_research_v4
  version: 4
  parent: configs/evolved_deep_research_agent_v2.yaml
  schema: configs/genome_schema.yaml
  evolution_stage: source_quality_discipline_candidate
  hypothesis: >
    The v2 genome is the best quality candidate so far, but the judge feedback
    repeatedly identifies weak, indirect, or decorative citations. Keeping the
    v2 coverage-injected workflow and budget while adding explicit source
    quality discipline should improve evidence quality and citation support
    without changing the tool boundary.
  tuning_notes: >
    Version 4 is intentionally based on v2 rather than v3. v2 achieved the best
    full-batch result (judge 0.7240, final 0.7833), while v3 showed that cost
    tuning can damage source quality. The v4 change targets v2's remaining
    errors: weak sources, broad citations, unsupported summary claims, and
    claims phrased as facts when they are only engineering inferences.
  derived_from_failure_modes:
    - weak_source_triage
    - weak_or_non_authoritative_sources
    - broad_or_decorative_citations
    - indirect_evidence_used_as_direct_support
    - unsupported_or_inferential_claims
    - citation_mismatch_risk

agent:
  id: evolved_deep_research_agent
  type: evolved_deep_research_v4
  domain: technical_deep_research_llm_agents
  description: >
    Source-quality candidate. It keeps v2's fixed coverage injection and
    original budget, but makes authority ranking, weak-source rejection,
    direct support, and inference labeling explicit in the runtime prompt.

model:
  provider: openai
  env_var: OPENAI_MODEL
  recommended_default: gpt-5.4-mini
  reasoning_effort: medium

workflow:
  - receive_question
  - decompose_question
  - create_search_plan
  - collect_candidate_sources
  - source_triage
  - extract_evidence
  - coverage_check
  - contradiction_check
  - synthesize_answer
  - citation_audit
  - report_limitations

prompt_roles:
  planner:
    objective: >
      Convert the user question into required subquestions, decision criteria,
      and evidence needs before searching.
    must_output:
      - subquestions
      - required_aspects
      - expected_source_types
  searcher:
    objective: >
      Generate focused search queries that target primary papers, official
      docs, benchmark pages, implementation repositories, and framework docs
      instead of secondary summaries.
    must_output:
      - queries
      - rationale_per_query
  source_triager:
    objective: >
      Rank candidate sources by authority, direct relevance, and whether they
      directly support an answer claim. Reject weak, broad, aggregator, forum,
      or SEO-style sources when an authoritative replacement exists.
    must_output:
      - accepted_sources
      - rejected_sources
      - rejection_reasons
  evidence_extractor:
    objective: >
      Convert accepted sources into a compact evidence table. Each evidence
      item must distinguish directly supported facts from engineering
      inferences drawn from the source.
    must_output:
      - claim
      - source_url
      - source_type
      - supported_aspect
      - support_directness
      - source_authority
      - confidence
  coverage_auditor:
    objective: >
      Check whether each required aspect is supported by at least one
      authoritative evidence item before synthesis.
    must_output:
      - covered_aspects
      - missing_aspects
      - followup_needed
  contradiction_auditor:
    objective: >
      Identify source disagreement, uncertainty, or claims that should be
      softened rather than stated as facts.
    must_output:
      - conflicting_claims
      - resolution
      - uncertainty_notes
  citation_auditor:
    objective: >
      Verify that important answer claims have direct source support and that
      citations are not merely decorative. Flag broad, weak, or indirect
      citations before final synthesis.
    must_output:
      - supported_claims
      - unsupported_claims
      - weak_citations
  synthesizer:
    objective: >
      Produce a concise engineering answer grounded in the evidence table.
      Separate directly sourced facts from engineering recommendations and
      explicitly mention trade-offs, limits, and unresolved uncertainty.
    must_output:
      - answer
      - sources
      - limitations

tools:
  allowed:
    - web_search
  forbidden:
    - arbitrary_code_execution
    - source_modification
    - unbounded_web_browsing
    - filesystem_write

limits:
  max_search_queries: 4
  max_sources: 6
  max_model_calls: 5
  max_runtime_seconds: 300
  max_evolution_rounds: 3

source_quality_policy:
  authority_order:
    - peer-reviewed papers or official proceedings
    - arXiv or preprint papers when proceedings are unavailable
    - official provider or framework documentation
    - benchmark pages, datasets, repositories, or implementation docs
    - engineering case studies from primary teams
    - secondary surveys only when they directly support the claim
  discouraged_sources:
    - reddit.com
    - www.reddit.com
    - wikipedia.org
    - papers.cool
    - papers.lunadong.com
    - generic SEO blog posts
    - uncited newsletter summaries
    - source aggregators that do not add primary evidence
  minimum_authoritative_sources: 4
  require_direct_support_for:
    - named failure modes
    - architecture comparisons
    - evaluation metrics
    - cost, latency, recovery, or reproducibility claims
    - benchmark or empirical performance claims
    - recommendations about when an engineering pattern is preferable
  inference_policy: >
    Engineering inferences are allowed, but they must be labeled as inferences
    or recommendations and must cite the source facts they are inferred from.
  weak_source_policy: >
    Weak sources should be rejected during source triage when an authoritative
    replacement exists. If a weak source is unavoidable, cite it only for the
    narrow claim it directly supports and flag it in the citation audit.

memory:
  policy: run_scoped_evidence_table
  rationale: >
    The agent may keep structured evidence during one run, but it must not use
    long-term memory across evaluation questions. This keeps the fixed
    evaluation set comparable across baselines and evolved candidates.
  allowed_items:
    - decomposition
    - search_plan
    - source_triage_table
    - evidence_table
    - coverage_audit
    - contradiction_audit
    - citation_audit

safeguards:
  require_primary_or_authoritative_sources: true
  require_rejected_source_reasons: true
  require_claim_level_citations: true
  require_direct_source_support: true
  require_inference_labeling: true
  require_limitations_section: true
  forbid_uncited_key_claims: true
  forbid_weak_sources_when_authoritative_replacement_exists: true
  forbid_hidden_extra_tool_calls: true
  on_budget_exceeded: stop_and_report_limitations

trace:
  required_events:
    - question_received
    - decomposition_created
    - search_plan_created
    - candidate_sources_collected
    - sources_triaged
    - evidence_extracted
    - coverage_checked
    - contradictions_checked
    - answer_synthesized
    - citations_audited
    - final_answer_returned
  required_artifacts:
    - decomposition
    - search_plan
    - candidate_sources
    - source_triage
    - evidence_table
    - coverage_audit
    - contradiction_audit
    - citation_audit
    - final_answer
    - usage

output_contract:
  required_sections:
    - answer
    - sources
    - limitations
  citation_style: inline_url
  unsupported_claim_policy: reject_or_flag
  required_answer_properties:
    - concise_engineering_summary
    - explicit_tradeoffs
    - uncertainty_when_evidence_is_mixed
    - no_source_free_key_claims
    - direct_source_support_for_key_claims
    - engineering_inferences_labeled
    - weak_citations_flagged_or_removed

evaluation:
  question_set: evals/questions.json
  rubric: evals/rubric.yaml
  compare_against:
    - baseline_no_web
    - baseline_web
    - evolved_deep_research_v2
  metrics:
    - final_score
    - judge_score
    - coverage_score
    - citation_support_score
    - source_quality_score
    - unsupported_claim_count
    - contradiction_handling_score
    - combined_total_tokens

acceptance_criteria:
  primary_metric: judge_score
  metrics:
    - final_score
    - judge_score
    - coverage_score
    - source_quality_score
    - unsupported_claim_count
    - combined_total_tokens
  accept_if:
    final_score_delta_vs_evolved_v2: 0.0
    judge_score_delta_vs_evolved_v2: 0.0
    source_quality_score_delta_min: 0.03
    unsupported_claim_count_delta_max: 0
    combined_total_tokens_multiplier_vs_evolved_v2_max: 1.1
  reject_if:
    - final_score_below_evolved_v2
    - judge_score_below_evolved_v2
    - source_quality_regression
    - weak_source_used_without_audit
    - citation_audit_missing
    - coverage_audit_missing
    - tool_budget_exceeded_without_reporting

rollback:
  policy: keep_previous_best_genome
  previous_best: configs/evolved_deep_research_agent_v2.yaml
  trigger:
    - validation_failed
    - smoke_test_failed
    - evaluation_regression
    - source_quality_regression
